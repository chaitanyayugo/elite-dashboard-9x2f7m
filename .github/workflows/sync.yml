name: Automatic Inventory Sync Engine

on:
  schedule:
    # Runs automatically every single day at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows you to also click a button to run it manually anytime

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Inventory Engine
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: python update_inventory.py

      - name: Commit and Push Refreshed Web Dashboard
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add index.html
          git commit -m "🔄 Cloud Sync: Automated Dashboard Refresh" || echo "No changes to commit"
          git push origin main
